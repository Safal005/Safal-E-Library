<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safal's E-Library - Sign Up</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>👤</text></svg>">
</head>
<body class="login-page">
    <form action="dashboard.html" class="login-form">
        <div class="login-container">
            <h1><i class="fa-solid fa-user-plus"></i> Sign Up</h1>

            <label for="username" class="user-pass">Username</label>
            <input type="text" name="username" placeholder="E-mail or Username" class="input-field">

            <label for="password" class="user-pass">Password</label>
            <input type="password" name="password" placeholder="Password" class="input-field">

            <label for="confirm-password" class="user-pass">Confirm Password</label>
            <input type="password" name="confirm-password" placeholder="Confirm Password" class="input-field">

            <button type="submit" class="sign-in">Sign Up</button>

            <p class="links">
                Already have an account? <a href="index.html" class="forgot-pass">Log In</a>
            </p>
        </div>
    </form>
</body>
</html>
