<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>📖</text></svg>">
</head>
<body>
<div id="navbar-container">
    <nav class="navbar">
        <div class="lhs">
            <a href="dashboard.html" style="text-decoration:none; color:black;">
                ⬅ Back to Dashboard
            </a>
        </div>
        <div class="rhs">
            <a href="dashboard.html">Home</a>
            <a href="about.html">About</a>

<div class="book-details-wrapper">
    <div class="book-details-card">

        <div class="book-image-section">
            <img id="book-image" src="" alt="Book Image">
        </div>

        <div class="book-info-section">
            <h1 id="book-title"><i class="fa-solid fa-book-open"></i> <span id="book-title-text">Book Title</span></h1>
            <h3 id="book-author">Author Name</h3>
            <p id="book-description">Description here...</p>
            <p id="book-price">$0.00</p>
            <button class="buy-btn" id="buy-btn">Buy Now</button>
        </div>

    </div>
</div>
<hr>

<h2>You may also like</h2>

    <div class="books" data-id="3">

    <div class="books" data-id="4">
