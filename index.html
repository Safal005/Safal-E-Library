<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safal's E-Library - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>🔐</text></svg>">
</head>
<body class="login-page">
    <form action="dashboard.html" class="login-form">
        <div class="login-container">
            <h1><i class="fa-solid fa-right-to-bracket"></i> Sign In</h1>

            <label for="username" class="user-pass">Username</label>
            <input type="text" name="username" placeholder="E-mail or Username" class="input-field">

            <label for="password" class="user-pass">Password</label>
            <input type="password" name="password" placeholder="Password" class="input-field">

            <button type="submit" class="sign-in">Log In</button>

            <p class="links">
                <span class="forgot-group">
                    Forgot Password? <a href="forgotpass.html" class="forgot-pass">Click here!</a>
                </span>
                <a href="signup.html" class="signup">Sign Up</a>
            </p>
        </div>
    </form>
</body>
</html>
